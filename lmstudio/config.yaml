# LM Studio plugin configuration.
#
# This file is the self-documenting source of truth for how the plugin connects
# to your local LM Studio server. An agent (or you) edits it directly — every
# field is documented in the comment right above it, so "how to set this" lives
# next to the value. The host parses this YAML and hands the plugin JSON via
# host.settingsJson(); you never edit JSON by hand.
#
# After changing a value the plugin re-reads it live — no CodeTerm restart.

# Base URL of the LM Studio server's OpenAI-compatible API.
#   - Start LM Studio, load a model, and click "Start Server" (Developer tab).
#   - The default LM Studio server listens on http://localhost:1234.
#   - The plugin appends /v1/chat/completions and /v1/models to this URL.
#   - A trailing slash is fine; it is normalized away.
#
# NOTE: the plugin may only reach hosts in its network allowlist (plugin.json →
# permissions.network.allow). The shipped default allows localhost:1234 and
# 127.0.0.1:1234. If you point baseUrl at a different host/port, add that
# host:port to the allowlist too, or the request is denied.
baseUrl: http://localhost:1234

# Model to request. LM Studio routes by the model identifier shown in its
# "loaded models" list (e.g. "llama-3.2-3b-instruct", "qwen2.5-7b-instruct").
#   - Run `listModels` (the picker is populated from GET /v1/models) to discover
#     the exact ids your server exposes.
#   - Leave this blank to let LM Studio use whatever model is currently loaded.
model: ""
